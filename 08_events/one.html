<script>
    document.querySelector('#owl').addEventListener('click',function(e){
        console.log(e);
        // alert('owl clicked')
        console.log('clicked the owl');
    },false)

    // here third parameter is called default propagation.

    // now we will add one more eventListener on click. and try to understand which one will get printed first.

    document.querySelector('.images').addEventListener('click',function(e){
        // alert('clicked on ul')
